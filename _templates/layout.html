{% extends "!layout.html" %}

{% block title %}
  <title>{{ html_title}}</title>
{% endblock %}

{% block extrahead %}
  {{ super() }}
<meta name="google-site-verification" content="rxCj12nTT9x33bb2k2rNjxLG4_Oie5PGF-AywATbXKI" />
<meta name="msvalidate.01" content="2C66FB722BD60FEE51537156950CA72D" />

<style>
    body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f7fb;
        color: #1f2933;
    }

    .container {
        max-width: 72%;
        margin: 40px auto;
        padding: 50px 30px;
        background-color: #ffffff;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        border: 1px solid #e5e9f2;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 25px 30px;
        background: linear-gradient(135deg, #0f172a, #1e3a8a);
        color: #ffffff;
        border-bottom: 1px solid #e5e9f2;
    }

    .logo {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    .logo img {
        max-width: 65%;
        height: auto;
        display: block;
    }

    h1 {
        font-size: 26px;
        font-weight: 500;
        margin: 0;
        color: #1e3a8a;
    }

    h2 {
        margin-top: 28px;
        color: #0f172a;
        border-left: 4px solid #2563eb;
        padding-left: 12px;
        font-weight: 600;
    }

    h3 {
        color: #334155;
        margin-top: 18px;
    }

    p {
        line-height: 1.7;
        font-size: 16px;
        margin-top: 10px;
        color: #374151;
    }

    ul, ol {
        padding-left: 24px;
        margin-top: 10px;
    }

    li {
        margin-bottom: 8px;
    }

    a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 500;
    }

    a:hover {
        text-decoration: underline;
        color: #1d4ed8;
    }

    footer {
        background-color: #0f172a;
        color: #cbd5f5;
        text-align: center;
        padding: 12px;
        font-size: 13px;
        margin-top: 40px;
    }

    @media (max-width: 768px) {
        .container {
            max-width: 92%;
            padding: 30px 20px;
        }

        header {
            flex-direction: column;
            text-align: center;
        }

        h1 {
            margin-top: 12px;
        }

        .logo img {
            max-width: 80%;
            margin: 0 auto;
        }
    }
</style>

{% endblock %}

{% block content %}
<header>
    <div class="logo">
        Blog
    </div>        
</header>
        
  <div class="container" style="background-color: #fefefe; padding: 1.5em; border: 1px solid #e5e9f2; margin-bottom: 2em;">

    
  </div>

  {{ super() }}
{% endblock %}
